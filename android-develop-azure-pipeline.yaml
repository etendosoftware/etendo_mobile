trigger:
- develop

variables:
  system.debug: false
  lastCommitMessage: "Merge pull request #31 from etendosoftware/feature/ETP-229  Feature ETP-229: Implement Sharing Intent for External Apps"
  pr.check.id: ""
  pr.status.id: ""
  MOBILECENTER_OUTPUT_DIRECTORY: $(Build.ArtifactStagingDirectory)/build
  MOBILECENTER_BRANCH: develop
  MOBILECENTER_BUILD_ID: $(Build.BuildNumber)
  MOBILECENTER_SOURCE_DIRECTORY: $(Build.Repository.LocalPath)
  MOBILECENTER_TRIGGER: continuous
  APPCENTER_OUTPUT_DIRECTORY: $(Build.ArtifactStagingDirectory)/build
  APPCENTER_BRANCH: develop
  APPCENTER_BUILD_ID: $(Build.BuildNumber)
  APPCENTER_SOURCE_DIRECTORY: $(Build.Repository.LocalPath)
  APPCENTER_TRIGGER: continuous
  artifactVersioning.build.format: timestamp
  buildScripts.toolset: '{"package.json":{"postClone":"appcenter-post-clone.sh"}}'
  javaScriptRunTests: false
  MOBILECENTER_REACTNATIVE_PACKAGE: package.json
  APPCENTER_REACTNATIVE_PACKAGE: package.json
  moduleName: app
  buildVariant: release
  isRoot: false
  runTests: false
  runLint: false
  keystorePassword: $(keystorePassword)
  keyAlias: $(keyAlias)
  keyPassword: $(keyPassword)
  keystoreFilename: etendo.keystore
  keystoreSecureFileId: 7530a682-a274-4fe9-bbc8-965742ea09cf
  keystoreEncoded: $(keystoreEncoded)
  automaticSigning: false
  buildBundle: true
  MOBILECENTER_ANDROID_MODULE: app
  MOBILECENTER_ANDROID_VARIANT: release
  APPCENTER_ANDROID_MODULE: app
  APPCENTER_ANDROID_VARIANT: release
  SONOMA_API_SERVER: https://api.appcenter.ms
  SONOMA_API_VERSION: v0.1
  VSMobileCenterUpload.ContinueIfSymbolsNotFound: true
  destinationSubtype: googleplay
  sonoma.tags: continuous,javascript,android,signed,android-app-bundle,distribution
  artifactVersioning.build.value: 0

jobs:
- job: Build
  pool:
    vmImage: 'ubuntu-latest'
  steps:
  - script: |
      Set-Location -Path '$(Agent.HomeDirectory)'
      Invoke-WebRequest -Uri 'https://appcenterbuildassets.azureedge.net/buildscripts/appcenter-build-assets-latest.zip' -OutFile 'appcenter-build-assets-latest.zip'
      if (Test-Path ./scripts) { Remove-Item -Path ./scripts -Force -Recurse }
      New-Item -ItemType directory -Path 'scripts' | Out-Null
      unzip -q -d 'scripts' 'appcenter-build-assets-latest.zip'
      Invoke-Expression 'bash ./scripts/init.sh'
    displayName: 'Install build scripts'
    continueOnError: true

  - script: bash appcenter-post-clone.sh
    displayName: 'Post Clone Script'

  - script: bash $(Agent.HomeDirectory)/scripts/select-node-version.sh node18
    displayName: 'Select Node.js Version v2'

  - script: |
      if [ -f yarn.lock ]; then
        yarn install --network-timeout=600000
      else
        npm install
      fi
    displayName: 'yarn/npm install'

  - script: |
      if [ -f node_modules/jetifier/bin/jetify ]; then
        node node_modules/jetifier/bin/jetify
      else
        echo "Warning: node_modules/jetifier/bin/jetify does not exist"
        echo "         source code will not be upgraded to AndroidX"
      fi
    displayName: 'Run Jetify'

  - script: bash $(Agent.HomeDirectory)/scripts/emit-tags.sh $(sonoma.tags)
    displayName: 'Tag build'

  - script: bash $(Agent.HomeDirectory)/scripts/install-keystore.sh $(keystoreEncoded)
    displayName: 'Install Android keystore'

  - task: Gradle@2
    inputs:
      workingDirectory: 'android'
      gradleWrapperFile: 'android/gradlew'
      tasks: 'clean :app:assembleRelease :app:bundleRelease'
      options: '-DAPPCENTER_KEYSTORE_PASSWORD="$(keystorePassword)" -DMOBILECENTER_KEYSTORE_PASSWORD="$(keystorePassword)" -DAPPCENTER_KEYSTORE_FILE_ID="$(keystoreFilename)" -DMOBILECENTER_KEYSTORE_FILE_ID="$(keystoreFilename)" -DAPPCENTER_KEY_ALIAS="$(keyAlias)" -DMOBILECENTER_KEY_ALIAS="$(keyAlias)" -DAPPCENTER_KEY_PASSWORD="$(keyPassword)" -DMOBILECENTER_KEY_PASSWORD="$(keyPassword)" -DAPPCENTER_BUILD_VERSION="$(Build.BuildNumber)" -DMOBILECENTER_BUILD_VERSION="$(Build.BuildNumber)"'
      publishJUnitResults: false
      testResultsFiles: '**/build/test-results/TEST-*.xml'
      codeCoverageTool: 'None'
    displayName: 'Gradle Task'

  - script: bash $(Agent.HomeDirectory)/scripts/android-postprocess.sh $(build.sourcesdirectory)/android/app/build/outputs/apk
    displayName: 'Android Postprocess'

  - task: AndroidSigning@3
    inputs:
      apksign: true
      apkFiles: '$(build.sourcesdirectory)/android/app/build/**/*.apk'
      keystoreFile: '$(keystoreSecureFileId)'
      keystorePass: '$(keystorePassword)'
      keystoreAlias: '$(keyAlias)'
      keyPass: '$(keyPassword)'
      zipalign: true
    displayName: 'Sign APK'

  - task: AndroidSigning@3
    inputs:
      jarsign: true
      apkFiles: '$(build.sourcesdirectory)/android/app/build/**/*.aab'
      keystoreFile: etendo.keystore
      keystorePass: '$(keystorePassword)'
      keystoreAlias: '$(keyAlias)'
      keyPass: '$(keyPassword)'
      jarsignerArguments: '-verbose -sigalg SHA256withRSA -digestalg SHA-256'
    displayName: 'Sign Android App Bundle'

  - task: CopyFiles@2
    inputs:
      SourceFolder: '$(build.sourcesdirectory)/android/app/build/outputs'
      Contents: 'apk/**/*.apk'
      TargetFolder: '$(build.artifactstagingdirectory)/build'
      CleanTargetFolder: false
      OverWrite: true
      flattenFolders: true
    displayName: 'Copy build files to staging'

  - task: CopyFiles@2
    inputs:
      SourceFolder: '$(build.sourcesdirectory)/android/app/build/outputs'
      Contents: 'bundle/**/*.aab'
      TargetFolder: '$(build.artifactstagingdirectory)/bundle'
      CleanTargetFolder: false
      OverWrite: true
      flattenFolders: true
    displayName: 'Copy bundle files to staging'

  - task: CopyFiles@2
    inputs:
      SourceFolder: '$(build.sourcesdirectory)/android/app/build/outputs'
      Contents: 'mapping/**/mapping.txt'
      TargetFolder: '$(build.artifactstagingdirectory)/mapping'
      CleanTargetFolder: false
      OverWrite: true
      flattenFolders: true
    displayName: 'Copy mapping files to staging'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(build.artifactstagingdirectory)/build'
      ArtifactName: 'build'
      publishLocation: 'Container'
    displayName: 'Publish build'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(build.artifactstagingdirectory)/bundle'
      ArtifactName: 'bundle'
      publishLocation: 'Container'
    displayName: 'Publish bundle'
    continueOnError: true

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(build.artifactstagingdirectory)/mapping'
      ArtifactName: 'mapping'
      publishLocation: 'Container'
    displayName: 'Publish mapping'
    condition: and(succeeded(), startsWith(variables['appcenter_android_postprocess_output.mapping'], true))
